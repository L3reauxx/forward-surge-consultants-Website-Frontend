name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Change to "master" if needed

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/actions-setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Can be 'yarn' or 'pnpm' depending on your project

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript project
        run: npm run build # Ensures your package.json has a build script (e.g., "tsc")

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Change to './build' or '.' depending on your output folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
